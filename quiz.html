<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Bab - dAIgnostic Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --primary: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(15, 23, 42, 0.15);
        }

        .option-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .option-card:hover {
            background-color: #f1f5f9;
        }

        .option-card.selected {
            border-color: #0f172a;
            background-color: #f1f5f9;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                        <span class="material-symbols-outlined text-white text-xl">quiz</span>
                    </div>
                    <span class="font-extrabold text-xl tracking-tight">dAIgnostic <span
                            class="text-slate-500">Learning</span></span>
                </div>
                <div id="user-info" class="text-sm font-semibold text-slate-600"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-12">
        <div id="quiz-loading" class="text-center py-20">
            <div
                class="inline-block animate-spin w-8 h-8 border-4 border-primary border-t-transparent rounded-full mb-4">
            </div>
            <p class="text-slate-500 font-medium">Menyiapkan kuis bab...</p>
        </div>

        <div id="quiz-container" class="hidden">
            <header class="mb-8 fade-in">
                <div class="flex items-center gap-3 mb-2">
                    <span id="bab-label"
                        class="bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded">Bab
                        1</span>
                    <span class="text-slate-400 text-xs">• 5 Pertanyaan</span>
                </div>
                <h1 id="bab-title" class="text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Evaluasi Mandiri
                </h1>
                <p class="text-slate-500 text-sm">Jawablah pertanyaan berikut dengan teliti untuk menyelesaikan bab ini.
                </p>
            </header>

            <div id="questions-list" class="space-y-8 fade-in">
                <!-- Questions will be injected here -->
            </div>

            <div class="mt-12 flex justify-center fade-in">
                <button onclick="handleQuizSubmit()" id="btn-submit"
                    class="bg-primary text-white px-10 py-4 rounded-2xl font-bold text-lg hover:bg-slate-800 transition-all shadow-xl shadow-primary/20 flex items-center gap-3">
                    Submit Jawaban <span class="material-symbols-outlined">send</span>
                </button>
            </div>
        </div>

        <div id="result-container" class="hidden text-center py-10 fade-in">
            <div class="mb-8">
                <div id="score-circle"
                    class="w-32 h-32 rounded-full border-8 border-emerald-500 flex items-center justify-center mx-auto mb-4">
                    <span id="final-score" class="text-4xl font-black text-slate-900">0</span>
                </div>
                <h2 class="text-2xl font-extrabold mb-1">Kuis Selesai!</h2>
                <p id="result-msg" class="text-slate-500">Selamat, Anda telah menyelesaikan bab ini.</p>
            </div>
            <div class="flex flex-col gap-3 max-w-xs mx-auto">
                <button onclick="location.href='materi.html'"
                    class="bg-primary text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition-all">
                    Kembali ke Materi
                </button>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentQuiz = null;
        let selectedAnswers = {};
        const urlParams = new URLSearchParams(window.location.search);
        const babNomor = urlParams.get('bab') || 1;

        async function initQuiz() {
            if (!isLoggedIn()) return;
            const nip = getCurrentNip();
            document.getElementById('user-info').innerText = nip;

            try {
                const data = await getQuiz(nip, babNomor);
                if (data.completed) {
                    showResult(data);
                    return;
                }
                currentQuiz = data;
                renderQuiz();
            } catch (err) {
                alert('Gagal memuat kuis: ' + err.message);
                location.href = 'materi.html';
            }
        }

        function renderQuiz() {
            document.getElementById('quiz-loading').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');

            document.getElementById('bab-label').innerText = `Bab ${babNomor}`;

            const list = document.getElementById('questions-list');
            list.innerHTML = currentQuiz.soal.map((s, idx) => `
                <div class="bg-white rounded-3xl border border-slate-200 p-8 card-hover">
                    <div class="flex gap-4 mb-6">
                        <span class="w-8 h-8 shrink-0 bg-slate-100 rounded-lg flex items-center justify-center text-sm font-bold text-slate-400">
                            ${idx + 1}
                        </span>
                        <p class="text-lg font-bold leading-relaxed text-slate-800">${s.pertanyaan}</p>
                    </div>
                    <div class="grid grid-cols-1 gap-3 ml-12">
                        ${s.opsi.map(o => {
                const letter = o[0];
                return `
                                <div onclick="selectAnswer(${s.nomor}, '${letter}')" 
                                     id="q-${s.nomor}-opt-${letter}"
                                     class="option-card p-4 rounded-xl bg-slate-50/50 border border-slate-100 flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center text-[10px] font-black text-slate-300">
                                        ${letter}
                                    </div>
                                    <span class="text-sm font-medium text-slate-600">${o}</span>
                                </div>
                            `;
            }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectAnswer(qNum, letter) {
            // Unselect previous
            const prev = selectedAnswers[qNum];
            if (prev) {
                document.getElementById(`q-${qNum}-opt-${prev}`).classList.remove('selected');
            }

            // Select new
            selectedAnswers[qNum] = letter;
            document.getElementById(`q-${qNum}-opt-${letter}`).classList.add('selected');
        }

        async function handleQuizSubmit() {
            const total = currentQuiz.soal.length;
            const answered = Object.keys(selectedAnswers).length;

            if (answered < total) {
                alert(`Harap jawab semua pertanyaan (${answered}/${total} terjawab).`);
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin material-symbols-outlined">sync</span> Menyimpan...';

            try {
                const nip = getCurrentNip();
                const result = await submitQuiz(nip, babNomor, selectedAnswers);
                showResult(result);
            } catch (err) {
                alert('Gagal submit quiz: ' + err.message);
                btn.disabled = false;
                btn.innerText = 'Submit Jawaban';
            }
        }

        function showResult(data) {
            document.getElementById('quiz-loading').classList.add('hidden');
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');

            document.getElementById('final-score').innerText = data.nilai;
            const circle = document.getElementById('score-circle');

            if (data.nilai >= 80) {
                circle.classList.add('border-emerald-500');
                document.getElementById('result-msg').innerText = "Luar biasa! Materi bab ini telah Anda kuasai.";
            } else if (data.nilai >= 60) {
                circle.classList.add('border-amber-500');
                document.getElementById('result-msg').innerText = "Bagus! Anda telah menyelesaikan bab ini.";
            } else {
                circle.classList.add('border-red-500');
                document.getElementById('result-msg').innerText = "Bab selesai, silakan baca kembali materi untuk pemahaman lebih lanjut.";
            }
        }

        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>

</html>
